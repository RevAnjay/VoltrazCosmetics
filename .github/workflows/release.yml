name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build with Maven
        run: mvn clean package -pl plugin -am -B

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: plugin/target/MagicCosmetics-*.jar
          generate_release_notes: true
          draft: false
          prerelease: false
